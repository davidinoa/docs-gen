name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Install build deps
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Install built wheel and run tests
        run: |
          pip install dist/*.whl
          pip install pytest pyyaml
          pytest tests/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading "v" so the install URL matches the wheel filename.
          VERSION="${TAG_VERSION#v}"
          {
            echo "## Install"
            echo
            echo '```'
            echo "pip install https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_VERSION}/docs_gen-${VERSION}-py3-none-any.whl"
            echo '```'
            echo
            echo "Requires Python 3.10+."
          } > /tmp/release_body.md
          gh release create "${TAG_VERSION}" dist/* \
            --title "${TAG_VERSION}" \
            --notes-file /tmp/release_body.md \
            --generate-notes
