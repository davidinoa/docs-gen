name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Install build deps
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Install built wheel and run tests
        run: |
          pip install dist/*.whl
          pip install pytest pyyaml
          pytest tests/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Install:
            ```
            pip install https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/docs_gen-${{ github.ref_name }}.whl
            ```
            Wait — the wheel filename uses the version without the leading `v`. The correct install URL will appear in the assets list below.
